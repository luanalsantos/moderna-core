<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderna Core - Jornada Integrada</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: #1a3a4a;
      background-color: #ffffff;
      overflow-x: hidden;
    }

    /* ===== JORNADA INTEGRADA SECTION ===== */
    .jornada-integrada {
      background-color: #f5f6f8;
      position: relative;
      overflow: hidden;
      padding: 80px 0 60px;
    }

    .jornada-integrada .content-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .jornada-text-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .jornada-text-col h2 {
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1.2;
      color: #1a3a4a;
      margin-bottom: 32px;
    }

    .jornada-text-col h2 strong {
      color: #1a3a4a;
      font-weight: 700;
    }

    .btn-escola-parceira {
      display: inline-block;
      background-color: #e86c3a;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 30px;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      transition: background-color 0.3s ease, transform 0.2s ease;
      width: fit-content;
    }

    .btn-escola-parceira:hover {
      background-color: #d45a2a;
      color: #ffffff;
      transform: translateY(-2px);
    }

    .jornada-image-col {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .jornada-image-col img {
      max-width: 100%;
      height: auto;
      max-height: 480px;
      object-fit: contain;
    }

    /* ===== FOOTER ===== */
    .site-footer {
      background-color: #ffffff;
      padding: 40px 0 36px;
      border-top: 1px solid #e8e8e8;
    }

    .site-footer .content-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .footer-logo img {
      height: 72px;
      width: auto;
    }

    .footer-links {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 6px;
    }

    .footer-links a {
      color: #5a6a72;
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover {
      color: #1a3a4a;
    }

    .footer-contact {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      gap: 6px;
    }

    .footer-contact span,
    .footer-contact a {
      color: #5a6a72;
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-contact a:hover {
      color: #1a3a4a;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 991.98px) {
      .jornada-integrada {
        padding: 60px 0 40px;
      }

      .jornada-text-col h2 {
        font-size: 2rem;
        text-align: center;
      }

      .jornada-text-col {
        align-items: center;
        text-align: center;
        margin-bottom: 32px;
      }

      .jornada-image-col img {
        max-height: 380px;
      }
    }

    @media (max-width: 767.98px) {
      .jornada-integrada {
        padding: 48px 0 32px;
      }

      .jornada-text-col h2 {
        font-size: 1.6rem;
      }

      .btn-escola-parceira {
        font-size: 0.85rem;
        padding: 8px 24px;
      }

      .jornada-image-col img {
        max-height: 300px;
      }

      .footer-logo {
        text-align: center;
        margin-bottom: 24px;
      }

      .footer-links {
        align-items: center;
        margin-bottom: 20px;
      }

      .footer-contact {
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- ===== JORNADA INTEGRADA ===== -->
  <section class="jornada-integrada" id="jornada_integrada">
    <div class="content-wrapper">
      <div class="row align-items-center g-4">
        <!-- Text Column -->
        <div class="col-lg-6 jornada-text-col">
          <h2>
            QUER CONSTRUIR ESSA<br>
            <strong>JORNADA INTEGRADA</strong><br>
            NA SUA ESCOLA?
          </h2>
          <a href="#" class="btn-escola-parceira">SEJA UMA ESCOLA PARCEIRA</a>
        </div>
        <!-- Image Column -->
        <div class="col-lg-6 jornada-image-col">
          <img
            src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/crianca-brincando-com-3d-Gc1NmkqnIOGBufr93cZ657S1JKz4L2.png"
            alt="Crianca feliz brincando no balanco com efeito 3D"
          >
        </div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="content-wrapper">
      <div class="row align-items-center g-3">
        <!-- Logo -->
        <div class="col-md-4 footer-logo">
          <img
            src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/logo-core-azul-hxsvdquRcy22ha78lbdUuMDxT2apEx.png"
            alt="Logo Moderna Core"
          >
        </div>
        <!-- Links -->
        <div class="col-md-4 footer-links">
          <a href="#">Fale conosco</a>
          <a href="#">Politica de privacidade</a>
        </div>
        <!-- Contact -->
        <div class="col-md-4 footer-contact">
          <span>0800 770 3004</span>
          <a href="#">Termos de uso</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

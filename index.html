<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
		<title>HTML5 com Bootstrap</title>
		
		<!-- Favicon -->
		<link rel="icon" type="image/png" href="assets/images/favicon.png">
		
		<!-- Icons -->
		<link rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
			integrity="sha384-CK2SzKma4jA5H/MXDUU7i1TqZlCFaD4T01vtyDFvPlD97JQyS+IsSh1nI2EFbpyk"
			crossorigin="anonymous" data-lum-singleton-id="bootstrap-icons.min.css">
		
		<!-- Styles -->
		<link rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous" data-lum-singleton-id="bootstrap.min.css">
		
		<link href="css/custom.css" rel="stylesheet">
		
		<!-- Google Fonts - Poppins -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
		
		<!-- Scripts -->
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous" defer
			data-lum-singleton-id="bootstrap.bundle.min.js"></script>
		
		<script src="scripts/custom.js" defer></script>
	</head>
	<body class="d-flex flex-column min-vh-100">
	
		<header class="position-absolute top-0 start-0 w-100 py-3">
		  <div class="container">
			<div class="row align-items-center">

			  <!-- Logo -->
			  <div class="col-4">
				<img src="img/logo-core-white.png"
					 alt="CORE"
					 class="img-fluid"
					 style="max-width:80px;">
			  </div>

			  <!-- Botão deslocado para direita -->
			  <div class="col-6 text-end">
				<a href="#"
				   class="btn rounded-pill px-4 py-2 fw-semibold text-white small"
				   style="background-color:#1f4c59;">
				  ➤ SEJA UMA ESCOLA PARCEIRA
				</a>
			  </div>

			  <!-- Menu -->
			  <div class="col-2 text-end">
				<button class="btn rounded-pill px-3 py-2"
						style="background-color:#1f4c59;">
				  <span class="text-white fs-5">☰</span>
				</button>
			  </div>

			</div>
		  </div>
		</header>
	
		<main class="flex-grow-1" page:holder="main">
			
			<!-- ============================================ -->
			<!-- BLOCO: JORNADA INTEGRADA - INÍCIO -->
			<!-- ============================================ -->
			<section class="jornada-integrada" id="jornada_integrada">
				
				<!-- CSS do Bloco Jornada Integrada -->
				<style>
					/* ============================================ */
					/* CSS - BLOCO JORNADA INTEGRADA */
					/* ============================================ */
					
					/* Reset e estilos globais para jornada */
					.jornada-integrada * {
						margin: 0;
						padding: 0;
						box-sizing: border-box;
					}
					
					/* Container principal da jornada */
					.jornada-integrada {
						font-family: 'Poppins', sans-serif;
						color: #1a3a4a;
						background-color: #f5f6f8;
						position: relative;
						overflow: hidden;
						padding: 80px 0 0;
						min-height: 480px;
					}
					
					/* Wrapper de conteúdo */
					.jornada-integrada .content-wrapper {
						max-width: 1200px;
						margin: 0 auto;
						padding: 0 24px;
						position: relative;
						z-index: 3;
					}
					
					/* Coluna de texto */
					.jornada-text-col {
						display: flex;
						flex-direction: column;
						justify-content: center;
						position: relative;
						z-index: 3;
						padding-bottom: 60px;
					}
					
					/* Título da jornada */
					.jornada-text-col h2 {
						font-size: 2.4rem;
						font-weight: 400;
						line-height: 1.2;
						color: #1a3a4a;
						margin-bottom: 32px;
					}
					
					.jornada-text-col h2 strong {
						color: #1a3a4a;
						font-weight: 700;
					}
					
					/* Botão Escola Parceira */
					.btn-escola-parceira {
						display: inline-block;
						background-color: #e86c3a;
						color: #ffffff;
						font-size: 1rem;
						font-weight: 500;
						letter-spacing: 1.5px;
						text-transform: uppercase;
						padding: 10px 30px;
						border: none;
						border-radius: 50px;
						text-decoration: none;
						transition: background-color 0.3s ease, transform 0.2s ease;
						width: fit-content;
					}
					
					.btn-escola-parceira:hover {
						background-color: #d45a2a;
						color: #ffffff;
						transform: translateY(-2px);
					}
					
					/* Área de imagens */
					.jornada-image-area {
						position: absolute;
						top: 0;
						right: 0;
						bottom: 0;
						width: 55%;
						display: flex;
						align-items: flex-end;
						justify-content: center;
						pointer-events: none;
					}
					
					/* Elemento 3D de fundo */
					.jornada-3d-element {
						position: absolute;
						top: 50%;
						right: 0;
						transform: translateY(-50%);
						width: 110%;
						height: 120%;
						object-fit: cover;
						object-position: left center;
						z-index: 1;
					}
					
					/* Imagem da criança */
					.jornada-child {
						position: relative;
						z-index: 2;
						max-height: 460px;
						width: auto;
						object-fit: contain;
						margin-bottom: 0;
					}
					
					/* Layout em linha */
					.jornada-row {
						display: flex;
						align-items: center;
						flex-wrap: wrap;
					}
					
					.jornada-col-text {
						flex: 0 0 auto;
						width: 50%;
					}
					
					/* Media Queries - Telas grandes */
					@media (min-width: 1400px) {
						.jornada-3d-element {
							width: 120%;
							height: 140%;
						}
					}
					
					@media (min-width: 1800px) {
						.jornada-3d-element {
							width: 130%;
							height: 160%;
						}
					}
					
					/* Media Queries - Tablets */
					@media (max-width: 991.98px) {
						.jornada-integrada {
							padding: 60px 0 0;
							min-height: auto;
						}
						
						.jornada-text-col {
							align-items: center;
							text-align: center;
							padding-bottom: 32px;
						}
						
						.jornada-text-col h2 {
							font-size: 2rem;
							text-align: center;
						}
						
						.jornada-col-text {
							width: 100%;
						}
						
						.jornada-image-area {
							position: relative;
							width: 100%;
							display: flex;
							align-items: flex-end;
							justify-content: center;
							min-height: 350px;
						}
						
						.jornada-3d-element {
							width: 100%;
							height: 100%;
							top: 0;
							transform: none;
							object-position: center bottom;
						}
						
						.jornada-child {
							max-height: 340px;
						}
					}
					
					/* Media Queries - Mobile */
					@media (max-width: 767.98px) {
						.jornada-integrada {
							padding: 48px 0 0;
						}
						
						.jornada-text-col h2 {
							font-size: 1.6rem;
						}
						
						.btn-escola-parceira {
							font-size: 0.85rem;
							padding: 8px 24px;
						}
						
						.jornada-child {
							max-height: 280px;
						}
						
						.jornada-image-area {
							min-height: 280px;
						}
					}
				</style>
				
				<!-- HTML do Bloco Jornada Integrada -->
				<div class="content-wrapper">
					<div class="jornada-row">
						<div class="jornada-col-text jornada-text-col">
							<h2>
								QUER CONSTRUIR ESSA<br>
								<strong>JORNADA INTEGRADA</strong><br>
								NA SUA ESCOLA?
							</h2>
							<a href="#" class="btn-escola-parceira">SEJA UMA ESCOLA PARCEIRA</a>
						</div>
					</div>
				</div>
				
				<div class="jornada-image-area">
					<img
						class="jornada-3d-element"
						src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/elemento-3d-variante-1-zLdhun2QsLcdr3GmxSEnGhg1PIH5wc.png"
						alt="Elemento 3D decorativo"
					>
					<img
						class="jornada-child"
						src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/crianca-brincando-S8LXyrsP2u304tPm0R3A6pi4zSaEJN.png"
						alt="Crianca feliz brincando no balanco"
					>
				</div>
				
				<!-- JavaScript do Bloco Jornada Integrada -->
				<script>
					/* ============================================ */
					/* JAVASCRIPT - BLOCO JORNADA INTEGRADA */
					/* ============================================ */
					
					(function() {
						'use strict';
						
						// Aguarda o carregamento completo do DOM
						document.addEventListener('DOMContentLoaded', function() {
							// Inicialização do bloco jornada-integrada
							const jornadaSection = document.getElementById('jornada_integrada');
							
							if (jornadaSection) {
								// Event listener para o botão "SEJA UMA ESCOLA PARCEIRA"
								const btnEscolaParceira = jornadaSection.querySelector('.btn-escola-parceira');
								
								if (btnEscolaParceira) {
									btnEscolaParceira.addEventListener('click', function(e) {
										// Adicionar lógica de ação aqui se necessário
										console.log('Botão Escola Parceira clicado');
									});
								}
								
								// Adicionar animações ou interações adicionais aqui
								console.log('Bloco Jornada Integrada inicializado');
							}
						});
					})();
				</script>
				
			</section>
			<!-- ============================================ -->
			<!-- BLOCO: JORNADA INTEGRADA - FIM -->
			<!-- ============================================ -->
			
		</main>
	
		<!-- ============================================ -->
		<!-- BLOCO: FOOTER - INÍCIO -->
		<!-- ============================================ -->
		<footer class="site-footer">
			
			<!-- CSS do Bloco Footer -->
			<style>
				/* ============================================ */
				/* CSS - BLOCO FOOTER */
				/* ============================================ */
				
				/* Reset e estilos globais para footer */
				.site-footer * {
					margin: 0;
					padding: 0;
					box-sizing: border-box;
				}
				
				/* Container principal do footer */
				.site-footer {
					background-color: #ffffff;
					padding: 24px 0 20px;
					border-top: 1px solid #e8e8e8;
				}
				
				/* Wrapper de conteúdo do footer */
				.site-footer .content-wrapper {
					max-width: 1200px;
					margin: 0 auto;
					padding: 0 24px;
				}
				
				/* Logo do footer */
				.footer-logo {
					display: flex;
					align-items: flex-start;
				}
				
				.footer-logo img {
					height: 72px;
					width: auto;
				}
				
				/* Links do footer */
				.footer-links {
					display: flex;
					flex-direction: column;
					justify-content: flex-start;
					align-items: flex-start;
					gap: 6px;
				}
				
				.footer-links a {
					color: #5a6a72;
					font-size: 0.9rem;
					text-decoration: none;
					transition: color 0.2s ease;
				}
				
				.footer-links a:hover {
					color: #1a3a4a;
				}
				
				/* Contato do footer */
				.footer-contact {
					display: flex;
					flex-direction: column;
					justify-content: flex-start;
					align-items: flex-end;
					gap: 6px;
				}
				
				.footer-contact span,
				.footer-contact a {
					color: #5a6a72;
					font-size: 0.9rem;
					text-decoration: none;
					transition: color 0.2s ease;
				}
				
				.footer-contact a:hover {
					color: #1a3a4a;
				}
				
				/* Linha do footer */
				.footer-row {
					display: flex;
					align-items: flex-start;
					justify-content: space-between;
					flex-wrap: wrap;
				}
				
				/* Colunas do footer */
				.footer-col-logo {
					flex: 0 0 auto;
					display: flex;
					align-items: flex-start;
				}
				
				.footer-col-links {
					flex: 0 0 auto;
					display: flex;
					align-items: flex-start;
				}
				
				.footer-col-contact {
					flex: 0 0 auto;
					display: flex;
					align-items: flex-start;
				}
				
				/* Media Queries - Mobile */
				@media (max-width: 767.98px) {
					.footer-col-logo,
					.footer-col-links,
					.footer-col-contact {
						width: 100%;
					}
					
					.footer-col-logo {
						text-align: center;
						margin-bottom: 24px;
					}
					
					.footer-links {
						align-items: center;
						margin-bottom: 20px;
					}
					
					.footer-contact {
						align-items: center;
					}
				}
			</style>
			
			<!-- HTML do Bloco Footer -->
			<div class="content-wrapper">
				<div class="footer-row">
					<div class="footer-col-logo footer-logo">
						<img
							src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/logo-core-azul-hxsvdquRcy22ha78lbdUuMDxT2apEx.png"
							alt="Logo Moderna Core"
						>
					</div>
					<div class="footer-col-links footer-links">
						<a href="#">Fale conosco</a>
						<a href="#">Politica de privacidade</a>
					</div>
					<div class="footer-col-contact footer-contact">
						<span>0800 770 3004</span>
						<a href="#">Termos de uso</a>
					</div>
				</div>
			</div>
			
			<!-- JavaScript do Bloco Footer -->
			<script>
				/* ============================================ */
				/* JAVASCRIPT - BLOCO FOOTER */
				/* ============================================ */
				
				(function() {
					'use strict';
					
					// Aguarda o carregamento completo do DOM
					document.addEventListener('DOMContentLoaded', function() {
						// Inicialização do bloco footer
						const footer = document.querySelector('.site-footer');
						
						if (footer) {
							// Event listeners para links do footer
							const footerLinks = footer.querySelectorAll('a');
							
							footerLinks.forEach(function(link) {
								link.addEventListener('click', function(e) {
									// Adicionar lógica de ação aqui se necessário
									console.log('Link do footer clicado:', this.href);
								});
							});
							
							// Adicionar funcionalidades adicionais do footer aqui
							console.log('Bloco Footer inicializado');
						}
					});
				})();
			</script>
			
		</footer>
		<!-- ============================================ -->
		<!-- BLOCO: FOOTER - FIM -->
		<!-- ============================================ -->

	</body>
</html>
